name: Policy Pipeline

on:
  push:
    branches: [main]
    paths: [policies/**]
  pull_request:
    branches: [main]
    paths: [policies/**]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Test Policies
    runs-on: ubuntu-latest
    outputs:
      has-html: ${{ steps.check-html.outputs.exists }}
    steps:
      - uses: actions/checkout@v5

      - uses: heutelbeck/setup-sapl@main

      - name: Run policy tests
        run: |
          set -o pipefail
          sapl test --dir ./policies --policy-hit-ratio 100 --html 2>&1 | tee test-output.txt

      - name: Write job summary
        if: always()
        continue-on-error: true
        run: |
          {
            echo "## Policy Test Results"
            echo ""
            if [ -f test-output.txt ]; then
              echo '```'
              sed 's/\x1b\[[0-9;]*m//g' test-output.txt
              echo '```'
            fi

            if [ -f sapl-coverage/coverage.ndjson ]; then
              echo ""
              echo "### Coverage"
              echo ""
              echo "| Policy | Branch Coverage | Conditions | Covered |"
              echo "|--------|---------------|------------|---------|"
              jq -r '.policies[]? | "| \(.documentName) | \(.branchCoveragePercent)% | \(.conditionCount) | \(.fullyCoveredConditions) |"' sapl-coverage/coverage.ndjson | sort -u
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: sapl-coverage
          path: sapl-coverage/

      - name: Check for HTML report
        id: check-html
        run: |
          ls -la sapl-coverage/ || true
          if [ -d sapl-coverage/html ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        if: steps.check-html.outputs.exists == 'true' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: sapl-coverage/html/

  pages:
    name: Deploy Coverage to GitHub Pages
    needs: test
    if: needs.test.outputs.has-html == 'true' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

  deploy:
    name: Sign and Publish Bundle
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: heutelbeck/setup-sapl@main

      - name: Write signing key
        run: echo "${BUNDLE_SIGNING_KEY}" > /tmp/signing.pem
        env:
          BUNDLE_SIGNING_KEY: ${{ secrets.BUNDLE_SIGNING_KEY }}

      - name: Stamp configurationId with git hash
        run: sed -i "s/@HEAD/@${GITHUB_SHA::7}/" policies/pdp.json

      - name: Create signed bundle
        run: sapl bundle create -i ./policies -k /tmp/signing.pem -o policies.saplbundle

      - name: Verify bundle with public key
        run: sapl bundle verify -b policies.saplbundle -k signing.pub

      - name: Inspect bundle
        run: sapl bundle inspect -b policies.saplbundle

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/signing.pem

      - name: Generate checksum
        run: sha256sum policies.saplbundle > SHA256SUMS.txt

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-bundle
          name: Latest Policy Bundle
          prerelease: false
          files: |
            policies.saplbundle
            SHA256SUMS.txt
            signing.pub
          body: |
            Signed policy bundle built from commit ${{ github.sha }}.

            Verify with:
            ```
            sapl bundle verify -b policies.saplbundle -k signing.pub
            sapl bundle inspect -b policies.saplbundle
            ```
